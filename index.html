<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Dakikalık Ev Egzersizi Zamanlayıcı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #444;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #45a049 100%);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .exercise-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .exercise-name {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .image-container {
            width: 300px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .exercise-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .timer {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            transition: color 0.3s ease;
        }

        .timer.exercise {
            color: #4CAF50;
        }

        .timer.rest {
            color: #FF9800;
        }

        .next-exercise {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #2196F3, #1976D2);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .start-screen, .end-screen {
            display: none;
        }

        .start-screen.active, .end-screen.active {
            display: block;
        }

        .end-screen h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .end-screen p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        .exercise-counter {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .exercise-name {
                font-size: 2rem;
            }
            
            .timer {
                font-size: 3rem;
            }
            
            .image-container {
                width: 250px;
                height: 150px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                width: 95%;
            }
            
            .exercise-name {
                font-size: 1.5rem;
            }
            
            .timer {
                font-size: 2.5rem;
            }
            
            .image-container {
                width: 200px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Genel İlerleme Çubuğu -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Başlangıç Ekranı -->
        <div class="start-screen active" id="startScreen">
            <h1 style="font-size: 2.5rem; margin-bottom: 30px;">15 Dakikalık Ev Egzersizi</h1>
            <p style="font-size: 1.2rem; margin-bottom: 30px; color: #ccc;">
                9 farklı egzersiz hareketi, her biri 1 dakika sürecek.<br>
                Her hareketten sonra 30 saniye dinlenme.
            </p>
            <button class="btn btn-primary" id="startBtn" onclick="startWorkout()">Antrenmana Başla</button>
        </div>

        <!-- Egzersiz Ekranı -->
        <div class="exercise-display" id="exerciseScreen">
            <div class="exercise-counter" id="exerciseCounter">Egzersiz 1 / 9</div>
            <div class="exercise-name" id="exerciseName">Squat</div>
            <div class="image-container">
                <img class="exercise-image" id="exerciseImage" src="egzersiz1.jpg" alt="Egzersiz">
            </div>
            <div class="timer exercise" id="timer">01:00</div>
            <div class="next-exercise" id="nextExercise" style="display: none;"></div>
        </div>

        <!-- Bitiş Ekranı -->
        <div class="end-screen" id="endScreen">
            <h2>🎉 Tebrikler!</h2>
            <p id="totalTime">Toplam süre: 15:00</p>
            <p>Harika bir antrenman tamamladınız!</p>
            <button class="btn btn-primary" onclick="resetWorkout()">Yeniden Başla</button>
        </div>

        <!-- Kontrol Butonları -->
        <div class="controls" id="controls">
            <button class="btn btn-secondary" id="pauseBtn" onclick="togglePause()" style="display: none;">Duraklat</button>
            <button class="btn btn-danger" id="resetBtn" onclick="resetWorkout()" style="display: none;">Sıfırla</button>
        </div>
    </div>

    <script>
        // Egzersiz verileri
        const exercises = [
            { name: 'Squat', image: 'egzersiz1.jpg' },
            { name: 'Push-up', image: 'egzersiz2.jpg' },
            { name: 'Plank', image: 'egzersiz3.jpg' },
            { name: 'Lunges', image: 'egzersiz4.jpg' },
            { name: 'Burpees', image: 'egzersiz5.jpg' },
            { name: 'Mountain Climbers', image: 'egzersiz6.jpg' },
            { name: 'Jumping Jacks', image: 'egzersiz7.jpg' },
            { name: 'High Knees', image: 'egzersiz8.jpg' },
            { name: 'Russian Twists', image: 'egzersiz9.jpg' }
        ];

        // Ses efektleri
        const bipSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBzGH0fPTgjMGHm7A7+OZURE');
        const bellSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBzGH0fPTgjMGHm7A7+OZURE');

        // Değişkenler
        let currentExercise = 0;
        let timeLeft = 60;
        let isPaused = false;
        let isResting = false;
        let totalWorkoutTime = 0;
        let workoutStartTime = null;
        let timerInterval = null;

        // DOM elementleri
        const startScreen = document.getElementById('startScreen');
        const exerciseScreen = document.getElementById('exerciseScreen');
        const endScreen = document.getElementById('endScreen');
        const exerciseName = document.getElementById('exerciseName');
        const exerciseImage = document.getElementById('exerciseImage');
        const timer = document.getElementById('timer');
        const nextExercise = document.getElementById('nextExercise');
        const exerciseCounter = document.getElementById('exerciseCounter');
        const progressFill = document.getElementById('progressFill');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const controls = document.getElementById('controls');

        // Antrenmana başla
        function startWorkout() {
            startScreen.classList.remove('active');
            exerciseScreen.style.display = 'block';
            controls.style.display = 'flex';
            pauseBtn.style.display = 'inline-block';
            resetBtn.style.display = 'inline-block';
            
            workoutStartTime = Date.now();
            updateExercise();
            startTimer();
        }

        // Egzersizi güncelle
        function updateExercise() {
            const exercise = exercises[currentExercise];
            exerciseName.textContent = exercise.name;
            exerciseImage.src = exercise.image;
            exerciseCounter.textContent = `Egzersiz ${currentExercise + 1} / 9`;
            
            // Sonraki egzersizi göster
            if (currentExercise < exercises.length - 1) {
                nextExercise.textContent = `Sıradaki Hareket: ${exercises[currentExercise + 1].name}`;
            } else {
                nextExercise.textContent = 'Antrenman Tamam!';
            }
        }

        // Zamanlayıcıyı başlat
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateTimer();
                    updateProgress();
                    
                    // Son 3 saniyede ses efekti
                    if (timeLeft <= 3 && timeLeft > 0) {
                        bipSound.play();
                    }
                    
                    // Süre bittiğinde
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        completePhase();
                    }
                }
            }, 1000);
        }

        // Zamanlayıcıyı güncelle
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timer.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // İlerleme çubuğunu güncelle
        function updateProgress() {
            const totalTime = 15 * 60; // 15 dakika toplam
            const elapsed = totalWorkoutTime + (60 - timeLeft) + (currentExercise * 30);
            const progress = (elapsed / totalTime) * 100;
            progressFill.style.width = `${Math.min(progress, 100)}%`;
        }

        // Fazı tamamla
        function completePhase() {
            bellSound.play();
            
            if (!isResting) {
                // Egzersiz tamamlandı, dinlenmeye geç
                isResting = true;
                timeLeft = 30;
                timer.className = 'timer rest';
                nextExercise.style.display = 'block';
                
                setTimeout(() => {
                    if (!isPaused) {
                        startTimer();
                    }
                }, 1000);
            } else {
                // Dinlenme tamamlandı, sonraki egzersize geç
                currentExercise++;
                totalWorkoutTime += 90; // 60s egzersiz + 30s dinlenme
                
                if (currentExercise < exercises.length) {
                    isResting = false;
                    timeLeft = 60;
                    timer.className = 'timer exercise';
                    nextExercise.style.display = 'none';
                    updateExercise();
                    
                    setTimeout(() => {
                        if (!isPaused) {
                            startTimer();
                        }
                    }, 1000);
                } else {
                    // Antrenman tamamlandı
                    endWorkout();
                }
            }
        }

        // Duraklat/Devam et
        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? 'Devam Et' : 'Duraklat';
            
            if (isPaused) {
                clearInterval(timerInterval);
            } else {
                startTimer();
            }
        }

        // Antrenmanı sıfırla
        function resetWorkout() {
            clearInterval(timerInterval);
            currentExercise = 0;
            timeLeft = 60;
            isPaused = false;
            isResting = false;
            totalWorkoutTime = 0;
            
            startScreen.classList.add('active');
            exerciseScreen.style.display = 'none';
            endScreen.classList.remove('active');
            controls.style.display = 'none';
            pauseBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            pauseBtn.textContent = 'Duraklat';
            progressFill.style.width = '0%';
            
            timer.className = 'timer exercise';
            nextExercise.style.display = 'none';
        }

        // Antrenmanı bitir
        function endWorkout() {
            clearInterval(timerInterval);
            
            const totalTime = Math.floor((Date.now() - workoutStartTime) / 1000);
            const minutes = Math.floor(totalTime / 60);
            const seconds = totalTime % 60;
            
            document.getElementById('totalTime').textContent = `Toplam süre: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            exerciseScreen.style.display = 'none';
            endScreen.classList.add('active');
            progressFill.style.width = '100%';
        }

        // Sayfa yüklendiğinde zamanlayıcıyı sıfırla
        window.addEventListener('load', () => {
            updateTimer();
        });
    </script>
</body>
</html>
