<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>15 Dakikalık Ev Egzersizi Zamanlayıcı</title>
<style>
  * {margin:0; padding:0; box-sizing:border-box;}
  html,body {height:100%; background:#000; color:#fff; overflow:hidden; font-family:sans-serif;}
  #exerciseImg {position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;}
  #timer {position:absolute; top:20px; right:20px; font-size:8rem; font-weight:bold; line-height:1; text-shadow:0 2px 10px rgba(0,0,0,0.7);}
</style>
</head>
<body>
<img id="exerciseImg" src="img/egzersiz1.jpg" alt="Egzersiz">
<div id="timer">60</div>

<script>
const images = [
  'img/egzersiz1.jpg',
  'img/egzersiz2.jpg',
  'img/egzersiz3.jpg',
  'img/egzersiz4.jpg',
  'img/egzersiz5.jpg',
  'img/egzersiz6.jpg',
  'img/egzersiz7.jpg',
  'img/egzersiz8.jpg',
  'img/egzersiz9.jpg'
];
let imgIndex = 0;
let isExercise = true; // true = exercise 60s, false = rest 30s
let timeLeft = isExercise ? 60 : 30;
const imgEl = document.getElementById('exerciseImg');
const timerEl = document.getElementById('timer');

function updateTimer() {
  timerEl.textContent = String(timeLeft).padStart(2, '0');
}
function tick() {
  if (timeLeft > 0) {
    timeLeft--;
    updateTimer();
  } else {
    // phase finished
    if (isExercise) {
      // exercise ended -> rest
      isExercise = false;
      timeLeft = 30;
    } else {
      // rest ended -> next exercise
      isExercise = true;
      imgIndex = (imgIndex + 1) % images.length;
      imgEl.src = images[imgIndex];
      timeLeft = 60;
    }
    updateTimer();
  }
}
setInterval(tick, 1000);
updateTimer();
</script>
</body>
</html>
