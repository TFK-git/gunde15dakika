<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 Dakikalık Ev Egzersizi Zamanlayıcı</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #04060a;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.14);
      z-index: 30;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e 0%, #38bdf8 100%);
      transition: width 0.3s ease;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
    }

    .screen.active {
      display: flex;
    }

    .start-screen {
      background: radial-gradient(circle at top, rgba(56,189,248,0.2), rgba(2,6,23,0.95));
    }

    .start-card,
    .end-card {
      text-align: center;
      max-width: 560px;
      padding: 40px 28px;
      border-radius: 24px;
      background: rgba(15,23,42,0.78);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 20px 50px rgba(0,0,0,0.38);
      backdrop-filter: blur(12px);
    }

    .start-card h1,
    .end-card h2 {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      margin-bottom: 16px;
    }

    .start-card p,
    .end-card p {
      font-size: 1.05rem;
      color: #d1d5db;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }

    .btn-primary {
      background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
      color: white;
    }

    .btn-secondary {
      background: linear-gradient(90deg, #38bdf8 0%, #2563eb 100%);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(90deg, #fb923c 0%, #ef4444 100%);
      color: white;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 20;
      background: #000;
    }

    .stage.active {
      display: block;
    }

    .stage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: brightness(0.72) contrast(1.08);
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.58) 100%);
      pointer-events: none;
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      z-index: 21;
    }

    .exercise-badge {
      align-self: flex-end;
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 700;
      background: rgba(2,6,23,0.74);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.24);
      max-width: min(70vw, 320px);
      text-align: right;
      line-height: 1.3;
    }

    .overlay-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
      flex: 1;
      padding-bottom: max(90px, 8vh);
    }

    .phase-label {
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #e2e8f0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .timer {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 4px 24px rgba(0,0,0,0.45);
    }

    .timer.exercise {
      color: #4ade80;
    }

    .timer.rest {
      color: #fbbf24;
    }

    .exercise-counter,
    .next-exercise {
      font-size: 1rem;
      color: #f8fafc;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      max-width: 420px;
    }

    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 12px;
      z-index: 22;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls.active {
      display: flex;
    }

    .end-screen {
      background: rgba(2,6,23,0.92);
    }

    @media (max-width: 768px) {
      .image-overlay {
        padding: 16px;
      }

      .overlay-content {
        padding-bottom: 120px;
      }

      .controls {
        bottom: 16px;
        width: calc(100% - 24px);
      }
    }

    @media (max-width: 480px) {
      .exercise-badge {
        font-size: 0.95rem;
        padding: 8px 12px;
      }

      .timer {
        font-size: clamp(3.2rem, 16vw, 5rem);
      }

      .btn {
        padding: 10px 18px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="screen start-screen active" id="startScreen">
    <div class="start-card">
      <h1>15 Dakikalık Ev Egzersizi</h1>
      <p>
        9 farklı hareket, her biri 1 dakika.<br />
        Her hareket sonrası 30 saniye dinlenme ve tam ekran görsel deneyimi.
      </p>
      <button class="btn btn-primary" onclick="startWorkout()">Antrenmana Başla</button>
    </div>
  </div>

  <div class="stage" id="stage">
    <img id="exerciseImage" src="img/egzersiz1.jpg" alt="Egzersiz" />
    <div class="image-overlay">
      <div class="exercise-badge" id="exerciseBadge">Egzersiz</div>

      <div class="overlay-content">
        <div class="phase-label" id="phaseLabel">Egzersiz</div>
        <div class="timer exercise" id="timer">01:00</div>
        <div class="exercise-counter" id="exerciseCounter">Egzersiz 1 / 9</div>
        <div class="next-exercise" id="nextExercise"></div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="btn btn-secondary" id="pauseBtn" onclick="togglePause()">Duraklat</button>
    <button class="btn btn-danger" id="resetBtn" onclick="resetWorkout()">Sıfırla</button>
  </div>

  <div class="screen end-screen" id="endScreen">
    <div class="end-card">
      <h2>🎉 Tebrikler!</h2>
      <p id="totalTime">Toplam süre: 00:00</p>
      <p>Harika bir antrenman tamamladınız.</p>
      <button class="btn btn-primary" onclick="resetWorkout()">Yeniden Başla</button>
    </div>
  </div>

  <script>
    const exercises = [
      { name: "Squat", image: "img/egzersiz1.jpg" },
      { name: "Push-up", image: "img/egzersiz2.jpg" },
      { name: "Plank", image: "img/egzersiz3.jpg" },
      { name: "Lunges", image: "img/egzersiz4.jpg" },
      { name: "Burpees", image: "img/egzersiz5.jpg" },
      { name: "Mountain Climbers", image: "img/egzersiz6.jpg" },
      { name: "Jumping Jacks", image: "img/egzersiz7.jpg" },
      { name: "High Knees", image: "img/egzersiz8.jpg" },
      { name: "Russian Twists", image: "img/egzersiz9.jpg" }
    ];

    const bipSound = new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBzGH0fPTgjMGHm7A7+OZURE");
    const bellSound = new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBzGH0fPTgjMGHm7A7+OZURE");

    let currentExercise = 0;
    let timeLeft = 60;
    let isPaused = false;
    let isResting = false;
    let totalWorkoutTime = 0;
    let workoutStartTime = null;
    let timerInterval = null;

    const startScreen = document.getElementById("startScreen");
    const stage = document.getElementById("stage");
    const endScreen = document.getElementById("endScreen");
    const exerciseImage = document.getElementById("exerciseImage");
    const exerciseBadge = document.getElementById("exerciseBadge");
    const phaseLabel = document.getElementById("phaseLabel");
    const timer = document.getElementById("timer");
    const nextExercise = document.getElementById("nextExercise");
    const exerciseCounter = document.getElementById("exerciseCounter");
    const progressFill = document.getElementById("progressFill");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const controls = document.getElementById("controls");

    function startWorkout() {
      startScreen.classList.remove("active");
      endScreen.classList.remove("active");
      stage.classList.add("active");
      controls.classList.add("active");

      currentExercise = 0;
      timeLeft = 60;
      isPaused = false;
      isResting = false;
      totalWorkoutTime = 0;
      workoutStartTime = Date.now();

      updateExerciseDisplay();
      startTimer();
    }

    function updateExerciseDisplay() {
      if (isResting) {
        const nextName = exercises[currentExercise]?.name || "Tamamlandı";
        exerciseBadge.textContent = `Sıradaki: ${nextName}`;
        phaseLabel.textContent = "Dinlenme";
        timer.className = "timer rest";
        exerciseCounter.textContent = `Hazır ol: ${currentExercise + 1} / 9`;
        nextExercise.textContent = `Bir sonraki hareket: ${nextName}`;
      } else {
        const exercise = exercises[currentExercise];
        exerciseBadge.textContent = exercise.name;
        phaseLabel.textContent = "Egzersiz";
        timer.className = "timer exercise";
        exerciseCounter.textContent = `Egzersiz ${currentExercise + 1} / 9`;
        nextExercise.textContent =
          currentExercise < exercises.length - 1
            ? `Sıradaki hareket: ${exercises[currentExercise + 1].name}`
            : "Son hareket!";
        exerciseImage.src = exercise.image;
        exerciseImage.onload = updateImageDisplay;
      }

      updateTimer();
      updateProgress();
    }

    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timer.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
    }

    function updateProgress() {
      const totalTime = 15 * 60;
      const phaseElapsed = isResting ? 30 - timeLeft : 60 - timeLeft;
      const elapsed = totalWorkoutTime + phaseElapsed;
      const progress = (elapsed / totalTime) * 100;
      progressFill.style.width = `${Math.min(progress, 100)}%`;
    }

    function updateImageDisplay() {
      const isPortrait = exerciseImage.naturalHeight > exerciseImage.naturalWidth;
      exerciseImage.style.objectFit = isPortrait ? "contain" : "cover";
      exerciseImage.style.objectPosition = "center center";
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!isPaused) {
          timeLeft--;
          updateTimer();
          updateProgress();

          if (timeLeft <= 3 && timeLeft > 0) {
            bipSound.play();
          }

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            completePhase();
          }
        }
      }, 1000);
    }

    function completePhase() {
      bellSound.play();

      if (!isResting) {
        totalWorkoutTime += 60;
        isResting = true;
        timeLeft = 30;
        updateExerciseDisplay();

        setTimeout(() => {
          if (!isPaused) startTimer();
        }, 1000);
      } else {
        totalWorkoutTime += 30;
        currentExercise++;

        if (currentExercise < exercises.length) {
          isResting = false;
          timeLeft = 60;
          updateExerciseDisplay();

          setTimeout(() => {
            if (!isPaused) startTimer();
          }, 1000);
        } else {
          endWorkout();
        }
      }
    }

    function togglePause() {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? "Devam Et" : "Duraklat";

      if (isPaused) {
        clearInterval(timerInterval);
      } else {
        startTimer();
      }
    }

    function resetWorkout() {
      clearInterval(timerInterval);
      currentExercise = 0;
      timeLeft = 60;
      isPaused = false;
      isResting = false;
      totalWorkoutTime = 0;

      stage.classList.remove("active");
      endScreen.classList.remove("active");
      startScreen.classList.add("active");
      controls.classList.remove("active");
      pauseBtn.textContent = "Duraklat";
      progressFill.style.width = "0%";
    }

    function endWorkout() {
      clearInterval(timerInterval);

      const totalTime = Math.floor((Date.now() - workoutStartTime) / 1000);
      const minutes = Math.floor(totalTime / 60);
      const seconds = totalTime % 60;

      document.getElementById("totalTime").textContent =
        `Toplam süre: ${minutes}:${seconds.toString().padStart(2, "0")}`;

      stage.classList.remove("active");
      controls.classList.remove("active");
      endScreen.classList.add("active");
      progressFill.style.width = "100%";
    }

    window.addEventListener("load", () => {
      updateTimer();
      exerciseImage.src = exercises[0].image;
      exerciseImage.onload = updateImageDisplay;
    });
  </script>
</body>
</html>
