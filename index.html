<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>15 Dakikalık Ev Egzersizi Zamanlayıcı</title>
<style>
  * {margin:0; padding:0; box-sizing:border-box;}
  html,body {height:100%; background:#000; color:#fff; overflow:hidden; font-family:sans-serif;}
  #exerciseImg {position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;}
  .timer-wrapper {
    position:absolute;
    left:20px;
    top:20px;
    width:180px;
    height:180px;
  }
  .timer-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:4rem;
    font-weight:bold;
    color:#000;
    line-height:1;
  }
</style>
</head>
<body>
<img id="exerciseImg" src="img/egzersiz1.jpg" alt="Egzersiz">
<div class="timer-wrapper">
  <svg class="gauge" width="180" height="180" viewBox="0 0 180 180">
    <circle class="bg" cx="90" cy="90" r="80" fill="#fff"/>
    <circle class="progress" cx="90" cy="90" r="80" fill="none" stroke-width="10" stroke-linecap="round"/>
  </svg>
  <div class="timer-text" id="timer">60</div>
</div>

<script>
const images = [
  'img/egzersiz1.jpg',
  'img/egzersiz2.jpg',
  'img/egzersiz3.jpg',
  'img/egzersiz4.jpg',
  'img/egzersiz5.jpg',
  'img/egzersiz6.jpg',
  'img/egzersiz7.jpg',
  'img/egzersiz8.jpg',
  'img/egzersiz9.jpg'
];
let imgIndex = 0;
let isExercise = true; // true = exercise, false = rest
let timeLeft = isExercise ? 60 : 30; // seconds
const imgEl = document.getElementById('exerciseImg');
const timerEl = document.getElementById('timer');
const progressCircle = document.querySelector('.progress');
const bipSound = new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBzGH0fPTgjMGHm7A7+OZURE");

// Pre-calc circumference
const radius = 80;
const circumference = 2 * Math.PI * radius;
progressCircle.style.strokeDasharray = `${circumference}`;

function updateTimer() {
  timerEl.textContent = String(timeLeft).padStart(2, '0');
  // set color based on phase
  if (isExercise) {
    progressCircle.style.stroke = '#ff0000'; // red for exercise
  } else {
    progressCircle.style.stroke = '#00ff00'; // green for rest
  }
  // update progress dash offset
  const total = isExercise ? 60 : 30;
  const progress = 1 - (timeLeft / total); // 0 at start, 1 at end
  const offset = circumference * progress;
  progressCircle.style.strokeDashoffset = offset;
}

function tick() {
  // beep in last 3 seconds
  if (timeLeft <= 3) {
    bipSound.currentTime = 0;
    bipSound.play().catch(()=>{}); // ignore autoplay errors
  }
  if (timeLeft > 0) {
    timeLeft--;
    updateTimer();
  } else {
    // phase finished
    if (isExercise) {
      // exercise ended -> rest
      isExercise = false;
      timeLeft = 30;
    } else {
      // rest ended -> next exercise
      isExercise = true;
      imgIndex = (imgIndex + 1) % images.length;
      imgEl.src = images[imgIndex];
      timeLeft = 60;
    }
    updateTimer();
  }
}

setInterval(tick, 1000);
updateTimer();
</script>
</body>
</html>
