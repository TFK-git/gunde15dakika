<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <circle cx="256" cy="256" r="240" fill="#1b5e20"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#4CAF50" stroke-width="16"/>
  <g fill="#ffffff" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- head -->
    <circle cx="270" cy="170" r="34" fill="#ffffff" stroke="none"/>
    <!-- body -->
    <line x1="262" y1="205" x2="250" y2="300"/>
    <!-- arms (running motion) -->
    <line x1="262" y1="230" x2="320" y2="210"/>
    <line x1="262" y1="230" x2="210" y2="265"/>
    <!-- legs (running motion) -->
    <line x1="250" y1="300" x2="310" y2="350"/>
    <line x1="250" y1="300" x2="200" y2="345"/>
  </g>
  <!-- motion lines -->
  <g stroke="#A5D6A7" stroke-width="12" stroke-linecap="round">
    <line x1="120" y1="200" x2="160" y2="200"/>
    <line x1="110" y1="240" x2="155" y2="240"/>
    <line x1="125" y1="280" x2="165" y2="280"/>
  </g>
</svg>
